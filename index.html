<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Ordini</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #2563eb;
  --primary-hover: #1e40af;
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
  --border: #e2e8f0;
  --radius: 14px;
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: var(--bg);
  color: var(--text);
}

header {
  background: linear-gradient(90deg, #1e293b, #0f172a);
  color: white;
  padding: 22px;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 0.5px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* ================== PRODOTTI ================== */

.products {
  flex: 3;
}

input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: white;
  font-size: 14px;
  transition: 0.2s ease;
}

input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

.product-card {
  background: var(--card);
  padding: 18px;
  border-radius: var(--radius);
  margin-bottom: 15px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
  transition: 0.2s ease;
  border: 1px solid var(--border);
}

.product-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 22px rgba(0,0,0,0.08);
}

/* ================== CARRELLO ================== */

.cart {
  flex: 1;
  background: var(--card);
  border-radius: var(--radius);
  padding: 15px;
  border: 1px solid var(--border);

  display: flex;
  flex-direction: column;

  height: 80vh; /* 🔥 altezza fissa */
}

/* SCROLL QUI */
.cart-items {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 10px;
  padding-right: 5px;
}

/* SCROLL STYLE (opzionale figo) */
.cart-items::-webkit-scrollbar {
  width: 6px;
}
.cart-items::-webkit-scrollbar-thumb {
  background: #cbd5f5;
  border-radius: 10px;
}

/* BOTTONE FISSO */
.order-button {
  position: sticky;
  bottom: 0;
  background: white;
  padding-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius);
  background: var(--primary);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: var(--primary-hover);
}

</style>
</head>

<body>

<header>
  Gestione Ordini
</header>

<div class="container">

  <!-- PRODOTTI -->
  <div class="products">
    <input type="text" placeholder="Cerca prodotto...">

    <div class="product-card">Prodotto 1</div>
    <div class="product-card">Prodotto 2</div>
    <div class="product-card">Prodotto 3</div>
    <div class="product-card">Prodotto 4</div>
    <div class="product-card">Prodotto 5</div>
  </div>

  <!-- CARRELLO -->
  <div class="cart">
    <h3>Carrello</h3>

    <div class="cart-items">
      <!-- prodotti aggiunti -->
      <div>Prodotto A</div>
      <div>Prodotto B</div>
      <div>Prodotto C</div>
      <div>Prodotto D</div>
      <div>Prodotto E</div>
      <div>Prodotto F</div>
      <div>Prodotto G</div>
      <div>Prodotto H</div>
      <div>Prodotto I</div>
    </div>

    <div class="order-button">
      <button>Ordina</button>
    </div>
  </div>

</div>

</body>
</html>
