<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Ordini</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1e40af;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --border: #e2e8f0;
      --radius: 14px;
      --danger: #dc2626;
      --success: #15803d;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(90deg, #1e293b, #0f172a);
      color: white;
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
    }

    .admin-btn {
      background: white;
      color: #0f172a;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      transition: 0.2s;
      white-space: nowrap;
    }

    .admin-btn:hover {
      background: #e2e8f0;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      align-items: flex-start;
    }

    .products {
      flex: 3;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
    }

    .product-card {
      background: var(--card);
      padding: 18px;
      border-radius: var(--radius);
      margin-bottom: 15px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .product-code {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .product-desc {
      color: #334155;
    }

    .product-warning-badge {
      margin-top: 8px;
      font-size: 13px;
      color: #b45309;
      font-weight: 600;
    }

    .product-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .product-actions input {
      max-width: 110px;
      margin-bottom: 0;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: #e2e8f0;
      color: #0f172a;
    }

    .secondary-btn:hover {
      background: #cbd5e1;
    }

    .danger-btn {
      background: var(--danger);
    }

    .danger-btn:hover {
      background: #b91c1c;
    }

    .cart {
      flex: 1;
      background: white;
      border-radius: var(--radius);
      padding: 15px;
      border: 1px solid var(--border);
      position: sticky;
      top: 20px;
      height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      min-width: 320px;
    }

    .cart-content {
      overflow-y: auto;
      flex: 1;
    }

    .cart-footer {
      position: sticky;
      bottom: 0;
      background: white;
      padding-top: 10px;
    }

    #inviaOrdine {
      width: 100%;
      padding: 12px;
      font-size: 16px;
    }

    textarea {
      resize: none;
      overflow: hidden;
      min-height: 44px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item-info {
      flex: 1;
      font-size: 14px;
    }

    .cart-item-code {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .empty-state {
      color: #64748b;
      font-size: 14px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 24px;
      animation: fadeUp 0.18s ease-out;
    }

    .modal-box.large {
      max-width: 780px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-badge {
      display: inline-block;
      background: #fef2f2;
      color: #b91c1c;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .modal-badge.info {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .modal-text {
      color: #334155;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .toast-wrap {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      min-width: 280px;
      max-width: 360px;
      background: white;
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px 16px;
      border-left: 5px solid var(--success);
      animation: fadeUp 0.2s ease-out;
    }

    .toast-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .toast-text {
      font-size: 14px;
      color: #475569;
    }

    .summary-box {
      margin-top: 14px;
    }

    .summary-section {
      margin-bottom: 18px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
    }

    .summary-label {
      font-size: 13px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .summary-value {
      color: #0f172a;
      white-space: pre-wrap;
    }

    .summary-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .summary-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: white;
    }

    .summary-item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .summary-item-code {
      font-weight: 700;
    }

    .summary-item-desc {
      color: #334155;
      margin-top: 4px;
    }

    .summary-item-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .summary-item-actions input {
      width: 100px;
      margin: 0;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .cart {
        position: relative;
        height: auto;
        width: 100%;
        min-width: unset;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .product-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .product-actions input {
        max-width: unset;
      }

      .modal-actions {
        flex-direction: column;
      }

      .summary-item-top {
        flex-direction: column;
      }

      .summary-item-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .summary-item-actions input {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-title">Gestione Ordini</div>
    <a href="./admin.html" class="admin-btn">Accesso Admin</a>
  </header>

  <div class="container">
    <div class="products">
      <input type="text" id="search" placeholder="🔍 Cerca per codice o descrizione">
      <div id="prodotti"></div>
    </div>

    <div class="cart">
      <div class="cart-content">
        <h3>🛒 Carrello</h3>

        <h4>Sede *</h4>
        <input type="text" id="sede" placeholder="Inserisci la sede" required>

        <h4>Password *</h4>
        <input type="password" id="password" placeholder="Inserisci password" required>

        <h4>Descrizione (opzionale)</h4>
        <textarea id="descrizioneOrdine" placeholder="Note aggiuntive (facoltative)" rows="2"></textarea>

        <div id="carrello"></div>
      </div>

      <div class="cart-footer">
        <button id="inviaOrdine" disabled>Visualizza Ordine</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="warningModal">
    <div class="modal-box">
      <div class="modal-badge">ATTENZIONE</div>
      <div class="modal-title">Conferma articolo</div>
      <div class="modal-text" id="warningMessage"></div>
      <div class="modal-actions">
        <button type="button" class="secondary-btn" id="warningCancel">Annulla</button>
        <button type="button" id="warningProceed">Procedi</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="orderSummaryModal">
    <div class="modal-box large">
      <div class="modal-badge info">RIEPILOGO ORDINE</div>
      <div class="modal-title">Controlla prima di confermare</div>
      <div id="orderSummaryContent"></div>
      <div class="modal-actions">
        <button type="button" class="secondary-btn" id="summaryClose">Chiudi</button>
        <button type="button" id="confirmOrderBtn">Invia Ordine</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function () {
      emailjs.init("V2AqVZ5Nr5ox99bsY");
    })();
  </script>

  <script type="module" src="./app.js"></script>
</body>
</html>
