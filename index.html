<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Ordini</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #2563eb;
  --primary-hover: #1e40af;
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
  --border: #e2e8f0;
  --radius: 14px;
}

body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: var(--bg);
  color: var(--text);
}

header {
  background: linear-gradient(90deg, #1e293b, #0f172a);
  color: white;
  padding: 22px;
  font-size: 22px;
  font-weight: 600;
}

/* ================== LAYOUT ================== */

.container {
  display: flex;
  gap: 20px;
  padding: 20px;
  align-items: flex-start;
}

/* ================== PRODOTTI ================== */

.products {
  flex: 3;
}

input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.product-card {
  background: var(--card);
  padding: 18px;
  border-radius: var(--radius);
  margin-bottom: 15px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
}

/* ================== BOTTONI ================== */

button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 9px 14px;
  border-radius: 8px;
  cursor: pointer;
}

button:disabled {
  background: #cbd5e1;
  cursor: not-allowed;
}

/* ================== CARRELLO FISSO ================== */

.cart {
  flex: 1;
  background: white;
  border-radius: var(--radius);
  padding: 15px;
  border: 1px solid var(--border);

  position: sticky;
  top: 20px;

  height: calc(100vh - 40px);

  display: flex;
  flex-direction: column;
}

/* SCROLL INTERNO */
.cart-content {
  overflow-y: auto;
  flex: 1;
}

/* FOOTER FISSO */
.cart-footer {
  position: sticky;
  bottom: 0;
  background: white;
  padding-top: 10px;
}

/* BOTTONE */
#inviaOrdine {
  width: 100%;
  padding: 12px;
  font-size: 16px;
}
  textarea {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  font-family: 'Inter', sans-serif;
  resize: none; /* blocca resize manuale */
  overflow: hidden; /* nasconde scrollbar */
  min-height: 44px;
}

/* ================== RESPONSIVE ================== */

@media (max-width: 900px) {
  .container {
    flex-direction: column;
  }

  .cart {
    position: relative;
    height: auto;
  }
}
</style>
</head>

<body>

<header>Gestione Ordini</header>

<div class="container">

  <!-- PRODOTTI -->
  <div class="products">
    <input type="text" id="search" placeholder="🔍 Cerca per codice o descrizione">
    <div id="prodotti"></div>
  </div>

  <!-- CARRELLO -->
  <div class="cart">

    <div class="cart-content">

      <h3>🛒 Carrello</h3>

      <h4>Sede *</h4>
      <input type="text" id="sede" placeholder="Inserisci la sede" required>

      <h4>Password *</h4>
      <input type="password" id="password" placeholder="Inserisci password" required>

      <h4>Descrizione (opzionale)</h4>
      <textarea id="descrizioneOrdine" placeholder="Note aggiuntive (facoltative)" rows="2"></textarea>

      <div id="carrello"></div>

    </div>

    <div class="cart-footer">
      <button id="inviaOrdine" disabled>Invia Ordine</button>
    </div>

  </div>

</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("V2AqVZ5Nr5ox99bsY");
})();
</script>

<!-- APP JS (IL TUO SERVER) -->
<script type="module" src="./app.js"></script>

</body>
</html>
