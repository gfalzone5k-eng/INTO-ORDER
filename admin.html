<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pannello Admin</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1e40af;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #15803d;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --border: #e2e8f0;
      --radius: 14px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(90deg, #1e293b, #0f172a);
      color: white;
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
    }

    .back-btn {
      background: white;
      color: #0f172a;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
    }

    .container {
      max-width: 1180px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card {
      background: white;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    .hidden {
      display: none;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
      align-items: start;
    }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      background: var(--primary-hover);
    }

    .secondary-btn {
      background: #e2e8f0;
      color: #0f172a;
    }

    .secondary-btn:hover {
      background: #cbd5e1;
    }

    .danger-btn {
      background: var(--danger);
    }

    .danger-btn:hover {
      background: var(--danger-hover);
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      min-height: 20px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .search-wrap {
      margin-bottom: 14px;
    }

    .articoli-lista {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .articolo-row {
      display: grid;
      grid-template-columns: 160px 1fr auto auto;
      gap: 12px;
      align-items: start;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }

    .articolo-codice {
      font-weight: 700;
    }

    .articolo-desc {
      color: #334155;
      margin-bottom: 6px;
    }

    .articolo-avviso {
      font-size: 13px;
      color: #b45309;
      white-space: pre-wrap;
    }

    .login-box {
      max-width: 420px;
      margin: 40px auto;
    }

    .toast-wrap {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      min-width: 280px;
      max-width: 360px;
      background: white;
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px 16px;
      border-left: 5px solid var(--success);
      animation: fadeUp 0.2s ease-out;
    }

    .toast-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .toast-text {
      font-size: 14px;
      color: #475569;
      white-space: pre-wrap;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }

      .articolo-row {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title">Pannello Admin</div>
    <a href="./index.html" class="back-btn">← Torna agli ordini</a>
  </header>

  <div class="container">
    <div class="card login-box" id="loginBox">
      <h2>Accesso Admin</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="adminPassword" placeholder="Password">
      <button id="loginBtn">Accedi</button>
      <div id="loginStatus" class="status"></div>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="admin-grid">
        <div class="card">
          <h2 id="formTitle">Nuovo articolo</h2>

          <input type="text" id="codiceArticolo" placeholder="Codice articolo">
          <input type="text" id="descrizioneArticolo" placeholder="Descrizione articolo">
          <textarea id="avvisoArticolo" placeholder="Messaggio attenzione opzionale da mostrare nel popup quando l'articolo viene aggiunto al carrello"></textarea>

          <div class="toolbar">
            <button id="salvaBtn">Salva articolo</button>
            <button id="nuovoBtn" type="button" class="secondary-btn">Nuovo articolo</button>
            <button id="annullaBtn" type="button" class="secondary-btn hidden">Annulla modifica</button>
            <button id="logoutBtn" type="button" class="danger-btn">Logout</button>
          </div>

          <div id="formStatus" class="status"></div>
        </div>

        <div class="card">
          <h2>Articoli nel database</h2>

          <div class="search-wrap">
            <input type="text" id="searchAdmin" placeholder="🔍 Cerca articolo per codice, descrizione o avviso">
          </div>

          <div id="listaArticoli" class="articoli-lista"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
